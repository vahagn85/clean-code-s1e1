<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body>
  <div class="header">
    <img src="./eisenhower-matrix.jpg">
    <a class="header__info-link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="todo">
    <p id="add-section">
      <label for="new-task">Add Item</label>
      <div class="todo__task-wrapper">
        <input id="new-task" class="todo__input" type="text">
        <button class="todo__add-btn">Add</button>
      </div>
    </p>
    <h3>Todo</h3>
    <ul id="complete-tasks">
      <li>
        <input type="checkbox">
        <label class="todo__label">Pay Bills</label>
        <input type="text" class="todo__input">
        <button class="todo__edit-btn">Edit</button>
        <button class="todo__delete-btn">
          <img src="./remove.svg">
        </button>
      </li>
      <li class="todo__edit-mode">
        <input type="checkbox">
        <label class="todo__label">Go Shopping</label>
        <input type="text" value="Go Shopping" class="todo__input">
        <button class="todo__edit-btn">Save</button>
        <button class="todo__delete-btn">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
    <h3>Completed</h3>
    <ul id="completed-tasks">
      <li>
        <input type="checkbox" checked>
        <label class="todo__label">See the Doctor</label>
        <input type="text" class="todo__input">
        <button class="todo__edit-btn">Edit</button>
        <button class="todo__delete-btn">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
