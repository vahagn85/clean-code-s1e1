<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css" media="screen">
</head>
<body class="todo-app">
  <header class="header">
    <img
      src="./eisenhower-matrix.jpg"
      alt="Eisenhower Matrix"
      class="header__img"
    >
    <a
      class="header__info-link"
      href="https://goal-life.com/page/method/matrix-eisenhower"
    >
      Want more details?
    </a>
  </header>
  <main class="todo">
    <section id="add-section">
      <label
        for="new-task"
        class="todo__add-label"
      >
        Add Item
      </label>
      <div class="todo__task-wrapper">
        <input
          id="new-task"
          class="todo__input"
          type="text"
        >
        <button class="todo__add-btn">Add</button>
      </div>
    </section>
    <h3 class="todo__heading">Todo</h3>
    <ul id="complete-tasks" class="todo__list">
      <li class="todo__list-item">
        <input type="checkbox" class="todo__checkbox">
        <label class="todo__label">Pay Bills</label>
        <input type="text" class="todo__input">
        <button class="todo__edit-btn">Edit</button>
        <button class="todo__delete-btn">
          <img
            src="./remove.svg"
            alt="Remove icon"
            class="todo__icon"
          >
        </button>
      </li>
      <li class="todo__list-item todo__list-item--edit-mode">
        <input type="checkbox" class="todo__checkbox">
        <label class="todo__label">Go Shopping</label>
        <input
          type="text"
          value="Go Shopping"
          class="todo__input"
        >
        <button class="todo__edit-btn">Save</button>
        <button class="todo__delete-btn">
          <img
            src="./remove.svg"
            alt="Remove icon"
            class="todo__icon"
          >
        </button>
      </li>
    </ul>
    <h3 class="todo__heading">Completed</h3>
    <ul id="completed-tasks" class="todo__list todo__list--completed">
      <li class="todo__list-item">
        <input type="checkbox" class="todo__checkbox" checked>
        <label class="todo__label">See the Doctor</label>
        <input type="text" class="todo__input">
        <button class="todo__edit-btn">Edit</button>
        <button class="todo__delete-btn">
          <img
            src="./remove.svg"
            alt="Remove icon"
            class="todo__icon"
          >
        </button>
      </li>
    </ul>
  </main>
  <script src="app.js"></script>
</body>
</html>
